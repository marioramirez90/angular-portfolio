<section id="my-skills" class="myskills">
    <div class="myskill-background">
        <img src="img/backgrounds/green-skills.svg" alt="my-skills-background" >
    </div>

    <div class="icon-skills">
        @for (skill of skills; track $index) {
            <div class="icon">
                <img class="image-icon" src="{{skill.image}}" alt="{{skill.name}}-icon">
                <p>{{skill.name}}</p>
            </div>
        }
             <div class="continually-icon icon">
  <img src="img/icons/continually.svg" class="base" alt="Continually-learning-icon">
  <img src="img/icons/continually-white.svg" class="white" alt="Hover icon">
  <img src="img/icons/bubble.svg" class="bubble" alt="Bubble">
  <p>{{ 'SKILLS.CONTINUALLY' | translate }}</p>
</div>
        
    </div>


    <div class="myskills-container">
        <div class="titel-myskills-container">
            <h3>{{ 'SKILLS.TITLE' | translate }}</h3>
            <div class="line"></div>
        </div>
        <div class="myskills-container-text" >
            <span>{{ 'SKILLS.DESCRIPTION' | translate }}</span>
            <p>{{ 'SKILLS.LOOKING_FOR' | translate }} <span class="highlight">{{ 'SKILLS.ANOTHER_SKILL' | translate }}</span>?</p> 
            <span>{{ 'SKILLS.ENTHUSIASM' | translate }}</span>
        </div>
        <button (click)="scrollTo('contact')" class="skills-button">{{ 'SKILLS.GET_IN_TOUCH' | translate }}</button>

    </div>

</section>
