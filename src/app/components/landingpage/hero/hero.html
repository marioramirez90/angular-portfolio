<section class="hero">
  <div class="hero-content">
    <div class="hero-left">
      <img class="hero-image-stack" src="img/backgrounds/photoshadows.svg" alt="" />
    </div>
    <div class="hero-right">
      <div class="rotation">
        <span>{{ 'HERO.I_AM' | translate }}</span>
      </div>
      <div class="hero-text">
        <h1>Mario Ramirez</h1>
        <h2>{{ 'HERO.ROLE' | translate }}</h2>
        <button (click)="scrollTo('contact')" class="hero-button">{{ 'HERO.LETS_TALK' | translate }}</button>
      </div>
    </div>
  </div>
  <div class="hero-background">
    <img src="img/backgrounds/Hero-Background.svg" alt="">
  </div>
  <div class="hero-bottom">
  <div class="hero-icons">
    <div class="hero-line"></div>
    <div class="icons">
      <a href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer">
        <img src="img/icons/linkedin.svg" alt="LinkedIn" />
      </a>
      <a href="https://github.com" target="_blank" rel="noopener noreferrer">
        <img src="img/icons/github.svg" alt="GitHub" />
      </a>
      <a href="mailto:mario-ramirez@hotmail.de">
        <img src="img/icons/email.svg" alt="E-Mail" />
      </a>
    </div>
    <p>mario-ramirez@hotmail.de</p>
    </div>
    <div class="scroll-down">
      <p>{{ 'HERO.SCROLL_DOWN' | translate }}</p>
      <img src="img/icons/scroll-down.svg" alt="Scroll Down">
    </div>
  
  </div>
  
  
</section>
